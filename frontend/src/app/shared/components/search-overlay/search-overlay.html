<!-- Transparent backdrop to catch clicks outside -->
<div class="fixed inset-0 z-[100]" tabindex="0" (click)="closeOverlay.emit()" (keydown.enter)="closeOverlay.emit()" aria-label="Đóng tìm kiếm"></div>

<!-- Minimal Search Dropdown Panel -->
<div class="fixed top-[72px] right-6 lg:right-20 z-[110] w-full max-w-[360px] md:max-w-[420px] bg-white dark:bg-surface-dark border border-slate-200 dark:border-white/10 rounded-2xl shadow-2xl p-4 animate-in fade-in slide-in-from-top-2 duration-200" 
     tabindex="0" (click)="$event.stopPropagation()" (keydown)="$event.stopPropagation()">
    
    <!-- Search Input Box -->
    <div class="relative group">
        <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-primary text-[20px]">search</span>
        <input 
            type="text" 
            class="w-full bg-slate-50 dark:bg-white/5 border border-slate-100 dark:border-white/10 rounded-xl pl-12 pr-12 py-3 text-slate-900 dark:text-white text-sm focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary transition-all shadow-inner"
            placeholder="Tìm kiếm sản phẩm..."
            autofocus
            [(ngModel)]="searchQuery"
            (keydown.enter)="onSearch()"
        />
        <button 
            class="absolute right-2 top-1/2 -translate-y-1/2 size-8 flex items-center justify-center text-slate-400 hover:text-red-500 rounded-lg transition-colors"
            (click)="closeOverlay.emit()"
            title="Đóng"
        >
            <span class="material-symbols-outlined text-[20px]">close</span>
        </button>
    </div>

    <!-- Dynamic Trending Products from Backend -->
    @if (trendingProducts.length > 0) {
        <div class="mt-4 flex flex-col">
            <p class="text-xs text-slate-500 dark:text-slate-400 font-semibold mb-2 flex items-center gap-1.5 px-2 uppercase tracking-wide">
                <span class="material-symbols-outlined text-sm text-amber-500">local_fire_department</span> Sản phẩm nổi bật
            </p>
            <div class="flex flex-col gap-1">
                @for (trend of trendingProducts; track trend) {
                    <button 
                        class="text-left px-3 py-2.5 rounded-lg hover:bg-slate-50 dark:hover:bg-white/5 text-sm text-slate-700 dark:text-slate-300 hover:text-primary dark:hover:text-primary transition-colors cursor-pointer truncate flex items-center gap-2 group"
                        (click)="searchFor(trend)"
                    >
                        <span class="material-symbols-outlined text-[16px] text-slate-300 group-hover:text-primary transition-colors">search</span>
                        <span class="truncate">{{ trend }}</span>
                    </button>
                }
            </div>
        </div>
    }
</div>
