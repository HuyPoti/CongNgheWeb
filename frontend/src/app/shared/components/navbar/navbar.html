<header class="flex items-center justify-between whitespace-nowrap border-b border-slate-200 dark:border-white/10 px-6 lg:px-20 py-4 bg-background-light dark:bg-background-dark sticky top-0 z-[100]">
    <div class="flex items-center gap-3 cursor-pointer" routerLink="/">
        <div class="size-8 text-primary">
            <svg fill="none" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
                <path d="M44 4H30.6666V17.3334H17.3334V30.6666H4V44H44V4Z" fill="currentColor"></path>
            </svg>
        </div>
        <h2 class="text-2xl font-bold tracking-tighter text-slate-900 dark:text-slate-100">ZX</h2>
    </div>
    <div class="flex items-center gap-8">
        <nav class="hidden md:flex items-center gap-8">
            <a class="text-slate-500 dark:text-slate-400 hover:text-primary dark:hover:text-accent-cyan text-sm font-medium transition-colors" routerLink="/product/list">{{ 'nav.shop' | translate }}</a>
            <a class="text-slate-500 dark:text-slate-400 hover:text-primary dark:hover:text-accent-cyan text-sm font-medium transition-colors" routerLink="/build-pc">{{ 'nav.build_pc' | translate }}</a>
            <a class="text-slate-500 dark:text-slate-400 hover:text-primary dark:hover:text-accent-cyan text-sm font-medium transition-colors" routerLink="/comparison">{{ 'nav.compare' | translate }}</a>
            <a class="text-slate-500 dark:text-slate-400 hover:text-primary dark:hover:text-accent-cyan text-sm font-medium transition-colors" routerLink="/tech-news">{{ 'nav.news' | translate }}</a>
        </nav>
        <div class="h-8 w-px bg-slate-200 dark:bg-white/10 hidden md:block"></div>
        <div class="flex items-center gap-2 lg:gap-4">
            <!-- Search Toggle -->
            <button class="p-2 text-slate-500 dark:text-slate-400 hover:text-primary transition-colors cursor-pointer" (click)="toggleSearch()" title="Advanced Search">
                <span class="material-symbols-outlined">search</span>
            </button>
            <!-- Theme Toggle -->

            <button class="relative p-2 text-slate-500 dark:text-slate-400 hover:text-primary transition-colors cursor-pointer" routerLink="/cart">
                <span class="material-symbols-outlined">shopping_cart</span>
                @if (cartCount() > 0) {
                    <span class="absolute top-0 right-0 size-4 bg-primary text-white text-[8px] font-black rounded-full flex items-center justify-center animate-bounce shadow-lg shadow-primary/30">
                        {{ cartCount() }}
                    </span>
                }
            </button>
            <button class="p-2 text-slate-500 dark:text-slate-400 hover:text-primary transition-colors cursor-pointer" routerLink="/user/profile" title="My Profile">
                <span class="material-symbols-outlined">account_circle</span>
            </button>
            <button class="flex min-w-[80px] lg:min-w-[100px] cursor-pointer items-center justify-center rounded-lg h-10 px-4 lg:px-5 bg-primary text-white text-sm font-bold transition-all hover:brightness-110 neon-glow" routerLink="/auth/login">
                {{ 'nav.login' | translate }}
            </button>
        </div>
    </div>
</header>

@if (isSearchOpen()) {
    <app-search-overlay (closeOverlay)="toggleSearch()"></app-search-overlay>
}
