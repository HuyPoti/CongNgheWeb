<!-- Profile Content (rendered inside UserLayout's router-outlet) -->
<div class="space-y-8 animate-in fade-in slide-in-from-bottom-6 duration-700">
  <!-- Personal Information -->
  <div
    class="bg-white dark:bg-surface-dark rounded-3xl border border-slate-100 dark:border-white/5 p-8 md:p-10 shadow-xl shadow-slate-200/50 dark:shadow-none"
  >
    <div class="flex items-center gap-4 mb-10 pb-6 border-b border-slate-50 dark:border-white/5">
      <div class="size-12 rounded-2xl bg-primary/5 flex items-center justify-center text-primary">
        <span class="material-symbols-outlined font-bold">badge</span>
      </div>
      <h2 class="text-2xl font-orbitron font-bold text-slate-900 dark:text-white">
        {{ 'user.profile_data' | translate }}
      </h2>
    </div>
    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
      <div class="space-y-3">
        <label
          for="fullName"
          class="text-[10px] font-bold text-slate-400 dark:text-slate-500 uppercase tracking-[0.2em] ml-1"
          >{{ 'user.profile_name' | translate }}</label
        >
        <input
          id="fullName"
          type="text"
          [(ngModel)]="fullName"
          class="w-full bg-slate-50 dark:bg-white/5 border border-slate-100 dark:border-white/10 rounded-2xl p-4 text-slate-900 dark:text-white focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all outline-none"
        />
      </div>
      <div class="space-y-3">
        <label
          for="email"
          class="text-[10px] font-bold text-slate-400 dark:text-slate-500 uppercase tracking-[0.2em] ml-1"
          >{{ 'user.profile_email' | translate }}</label
        >
        <input
          id="email"
          type="email"
          [value]="user()?.email || ''"
          readonly
          class="w-full bg-slate-50 dark:bg-white/5 border border-slate-100 dark:border-white/10 rounded-2xl p-4 text-slate-900 dark:text-white focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all outline-none"
        />
      </div>
      <div class="space-y-3">
        <label
          for="phone"
          class="text-[10px] font-bold text-slate-400 dark:text-slate-500 uppercase tracking-[0.2em] ml-1"
          >{{ 'user.profile_phone' | translate }}</label
        >
        <input
          id="phone"
          type="tel"
          [(ngModel)]="phone"
          class="w-full bg-slate-50 dark:bg-white/5 border border-slate-100 dark:border-white/10 rounded-2xl p-4 text-slate-900 dark:text-white focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all outline-none"
        />
      </div>
    </div>
    <div class="flex justify-end mt-12">
      <button
        (click)="saveChanges()"
        class="px-10 py-4 bg-primary hover:bg-primary/90 text-white font-bold rounded-2xl transition-all shadow-lg shadow-primary/30 hover:scale-105 active:scale-95 flex items-center gap-3"
      >
        <span class="material-symbols-outlined text-lg">save</span>
        {{ 'settings.save_changes' | translate }}
      </button>
    </div>
  </div>
</div>
