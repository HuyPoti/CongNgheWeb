<div class="fixed inset-0 bg-black/80 backdrop-blur-md z-[60] flex items-center justify-center p-4">
  <div class="bg-surface-dark border border-emerald-500/20 rounded-3xl w-full max-w-lg overflow-hidden shadow-[0_0_50px_rgba(16,185,129,0.1)]">
    <!-- Header -->
    <div class="p-8 border-b border-emerald-500/10 flex items-center justify-between bg-emerald-500/5">
      <div class="flex items-center gap-4">
        <div class="w-12 h-12 bg-emerald-500 text-background-dark rounded-2xl flex items-center justify-center shadow-lg shadow-emerald-500/20">
          <span class="material-symbols-outlined font-bold">fact_check</span>
        </div>
        <div>
          <h2 class="text-xl font-black text-slate-100 tracking-tight uppercase italic font-neon">Kiểm tra QC</h2>
          <p class="text-xs text-emerald-400 font-bold tracking-widest uppercase">{{ orderId }}</p>
        </div>
      </div>
      <button (click)="onClose()" class="text-slate-500 hover:text-white p-2 hover:bg-slate-800 rounded-xl transition-all">
        <span class="material-symbols-outlined">close</span>
      </button>
    </div>

    <!-- Content -->
    <div class="p-8 space-y-6">
      <div class="bg-slate-900/50 p-6 rounded-2xl border border-emerald-500/5">
        <p class="text-xs font-black text-slate-500 uppercase tracking-widest mb-6">Danh mục kiểm tra</p>
        <div class="space-y-4">
          @for (item of checklist; track item.id) {
            <label class="flex items-center gap-4 cursor-pointer group">
              <div class="relative flex items-center">
                <input type="checkbox" [(ngModel)]="item.checked" 
                       class="peer appearance-none w-6 h-6 border-2 border-slate-700 rounded-lg checked:bg-emerald-500 checked:border-emerald-500 transition-all">
                <span class="material-symbols-outlined absolute text-background-dark scale-0 peer-checked:scale-100 transition-transform font-bold text-lg pointer-events-none left-0.5">check</span>
              </div>
              <span class="text-sm font-medium text-slate-400 group-hover:text-slate-200 transition-colors" [class.line-through]="item.checked" [class.opacity-50]="item.checked">
                {{ item.label }}
              </span>
            </label>
          }
        </div>
      </div>

      <div>
        <label class="block text-xs font-black text-slate-500 uppercase tracking-widest mb-3 px-1">Ghi chú kiểm hàng (nếu có)</label>
        <textarea [(ngModel)]="qcNotes" 
                  placeholder="Nhập tình trạng sản phẩm..."
                  class="w-full bg-slate-900 border border-slate-700 rounded-2xl p-4 text-sm text-slate-200 focus:outline-none focus:border-emerald-500/50 transition-all h-24 resize-none"></textarea>
      </div>
    </div>

    <!-- Actions -->
    <div class="p-8 bg-slate-900/50 flex gap-4 border-t border-emerald-500/10">
      <button (click)="onClose()" class="flex-1 py-4 px-6 rounded-2xl font-bold text-slate-400 hover:bg-slate-800 transition-all">Hủy</button>
      <button (click)="submitQC()" 
              [disabled]="!isAllChecked"
              [class.opacity-50]="!isAllChecked"
              [class.cursor-not-allowed]="!isAllChecked"
              class="flex-2 py-4 px-10 bg-emerald-500 hover:bg-emerald-400 disabled:bg-slate-700 text-background-dark font-black uppercase tracking-widest text-xs rounded-2xl shadow-lg shadow-emerald-500/20 transition-all">
        Xác nhận QC & Đóng gói
      </button>
    </div>
  </div>
</div>
