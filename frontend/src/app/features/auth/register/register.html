<div
  class="flex-1 flex items-center justify-center p-6 lg:p-12 w-full bg-background-light dark:bg-background-dark transition-colors duration-500"
>
  <div
    class="max-w-6xl w-full flex flex-col lg:flex-row bg-white dark:bg-surface-dark rounded-[3rem] overflow-hidden shadow-[0_0_100px_rgba(0,0,0,0.1)] border border-slate-100 dark:border-white/5"
  >
    <!-- Left Side: Visual/Branding -->
    <div class="hidden lg:flex lg:w-1/2 relative min-h-[700px] bg-slate-950 overflow-hidden">
      <div
        class="absolute inset-0 z-10 bg-gradient-to-r from-slate-950 via-slate-950/40 to-transparent"
      ></div>
      <!-- Animated decorative elements -->
      <div
        class="absolute -top-24 -left-24 size-96 bg-primary/20 rounded-full blur-[120px] animate-pulse"
      ></div>
      <div
        class="absolute inset-0 opacity-[0.05] pointer-events-none"
        style="
          background-image: radial-gradient(circle at center, #0066ff 1px, transparent 1px);
          background-size: 40px 40px;
        "
      ></div>

      <div
        class="absolute inset-0 bg-cover bg-center transition-transform duration-[10000ms] hover:scale-110"
        style="
          background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuBWPHC83VT3lsEt_nQFA4ARGE1bzPdWb_IxWlepWAgbmv3kLkpN-VdVl72XADm3_KBQ0_PZv7IZfJvxSMnjlxzWFc3grSn9Qz34TSmvTVF9WVLZbQ7neAiQkumpq4ldvK4R9kHIkC07UTy0vPR3mnQwdObHCUsgVmICmdubrME-4E1-EA1QSUWXu8b1ir86Plcd6wmrf7JiIXhgMgvmNhEmumSRnmsMxlvZsHXjTsv02LPRSLZ5frTwVA6RV4fBK73KKzG9uAnx7fwZ');
        "
      ></div>

      <div class="relative z-20 p-16 flex flex-col justify-end h-full">
        <div
          class="inline-flex items-center gap-3 px-4 py-1.5 rounded-full bg-primary/20 border border-primary/30 text-accent-cyan text-[10px] font-black uppercase tracking-[0.2em] mb-6 w-fit backdrop-blur-md"
        >
          <span class="relative flex h-2 w-2">
            <span
              class="animate-ping absolute inline-flex h-full w-full rounded-full bg-accent-cyan opacity-75"
            ></span>
            <span class="relative inline-flex rounded-full h-2 w-2 bg-accent-cyan"></span>
          </span>
          Join the Collective
        </div>
        <h1
          class="text-5xl md:text-6xl font-orbitron font-bold text-white leading-[1.1] mb-6 tracking-tight"
        >
          Evolve Your <br /><span class="text-primary italic">Identity</span>
        </h1>
        <p class="text-slate-300 text-lg max-w-md leading-relaxed font-medium">
          Join 50,000+ operatives. Access the next generation of hardware protocols.
        </p>
      </div>
    </div>

    <!-- Right Side: Auth Form -->
    <div class="w-full lg:w-1/2 p-10 lg:p-20 flex flex-col justify-center bg-transparent">
      <div class="mb-12">
        <span
          class="font-orbitron text-[10px] font-black text-primary uppercase tracking-[0.4em] mb-4 block"
          >Registration Protocol</span
        >
        <h3
          class="text-4xl font-display font-bold text-slate-900 dark:text-white mb-3 uppercase tracking-tight"
        >
          Create Account
        </h3>
        <p class="text-slate-500 dark:text-slate-400 font-medium">
          Initialize your profile to begin the deployment.
        </p>
      </div>

      <!-- Tabs -->
      <div
        class="flex gap-4 p-1.5 bg-slate-50 dark:bg-white/5 rounded-2xl mb-12 border border-slate-100 dark:border-white/5"
      >
        <button
          class="flex-1 py-4 text-xs font-black tracking-[0.2em] text-slate-400 hover:text-primary transition-all uppercase"
          routerLink="/auth/login"
        >
          Login
        </button>
        <button
          class="flex-1 py-4 text-xs font-black tracking-[0.2em] bg-white dark:bg-slate-800 text-slate-900 dark:text-white rounded-xl shadow-lg border border-slate-100 dark:border-white/10 transition-all uppercase"
        >
          Register
        </button>
      </div>

      <!-- Form Fields -->
      <form class="space-y-6" [formGroup]="registerForm" (ngSubmit)="onSubmit()">
        <div class="space-y-3">
          <label
            for="fullName"
            class="text-[10px] font-black uppercase tracking-[0.3em] text-slate-400 px-1"
            >Full Designation</label
          >
          <div class="relative group">
            <span
              class="absolute left-5 top-1/2 -translate-y-1/2 material-symbols-outlined text-slate-400 group-focus-within:text-primary transition-colors"
              >person</span
            >
            <input
              id="fullName"
              formControlName="fullName"
              class="w-full bg-slate-50 dark:bg-white/5 border border-slate-200 dark:border-white/10 rounded-2xl h-16 pl-14 pr-6 text-slate-900 dark:text-white placeholder:text-slate-400 focus:ring-4 focus:ring-primary/10 focus:border-primary outline-none transition-all font-bold shadow-inner"
              placeholder="Alex Morgan"
              type="text"
            />
          </div>
        </div>

        <div class="space-y-3">
          <label
            for="email"
            class="text-[10px] font-black uppercase tracking-[0.3em] text-slate-400 px-1"
            >Archive Address</label
          >
          <div class="relative group">
            <span
              class="absolute left-5 top-1/2 -translate-y-1/2 material-symbols-outlined text-slate-400 group-focus-within:text-primary transition-colors"
              >alternate_email</span
            >
            <input
              id="email"
              formControlName="email"
              class="w-full bg-slate-50 dark:bg-white/5 border border-slate-200 dark:border-white/10 rounded-2xl h-16 pl-14 pr-6 text-slate-900 dark:text-white placeholder:text-slate-400 focus:ring-4 focus:ring-primary/10 focus:border-primary outline-none transition-all font-bold shadow-inner"
              placeholder="operativ@zx-systems.net"
              type="email"
            />
          </div>
        </div>

        <div class="space-y-3">
          <label
            for="password"
            class="text-[10px] font-black uppercase tracking-[0.3em] text-slate-400 px-1"
            >Security Cipher</label
          >
          <div class="relative group">
            <span
              class="absolute left-5 top-1/2 -translate-y-1/2 material-symbols-outlined text-slate-400 group-focus-within:text-primary transition-colors"
              >lock</span
            >
            <input
              id="password"
              formControlName="password"
              class="w-full bg-slate-50 dark:bg-white/5 border border-slate-200 dark:border-white/10 rounded-2xl h-16 pl-14 pr-14 text-slate-900 dark:text-white placeholder:text-slate-400 focus:ring-4 focus:ring-primary/10 focus:border-primary outline-none transition-all font-bold shadow-inner"
              placeholder="••••••••"
              type="password"
            />
            <button
              class="absolute right-5 top-1/2 -translate-y-1/2 text-slate-400 hover:text-primary transition-colors cursor-pointer"
              type="button"
            >
              <span class="material-symbols-outlined text-xl">visibility</span>
            </button>
          </div>
        </div>

        <div class="flex items-center gap-3 px-1 py-2">
          <input
            id="terms"
            type="checkbox"
            class="size-5 rounded-lg border-2 border-slate-200 dark:border-white/10 bg-slate-50 dark:bg-white/5 text-primary focus:ring-primary transition-all cursor-pointer"
          />
          <label
            for="terms"
            class="text-[10px] font-bold text-slate-500 dark:text-slate-400 uppercase tracking-widest cursor-pointer"
            >I accept the
            <a class="text-primary hover:text-accent-cyan transition-colors" href="#"
              >Deployment Terms</a
            ></label
          >
        </div>

        <button
          class="w-full bg-primary text-white font-black h-16 rounded-2xl shadow-2xl shadow-primary/30 hover:shadow-primary/50 hover:scale-[1.02] active:scale-95 transition-all flex items-center justify-center gap-4 group uppercase tracking-[0.2em] text-xs disabled:opacity-50 disabled:cursor-not-allowed"
          type="submit"
          [disabled]="isLoading || registerForm.invalid"
        >
          {{ isLoading ? 'Deploying...' : 'Initialize Deployment' }}
          <span
            class="material-symbols-outlined text-xl group-hover:translate-x-1 transition-transform"
            *ngIf="!isLoading"
            >how_to_reg</span
          >
          <span class="material-symbols-outlined text-xl animate-spin" *ngIf="isLoading"
            >progress_activity</span
          >
        </button>
      </form>

      <!-- Social Auth -->
      <div class="mt-12">
        <div class="relative flex items-center mb-10">
          <div class="flex-grow border-t border-slate-100 dark:border-white/10"></div>
          <span
            class="flex-shrink mx-6 text-[9px] font-black text-slate-400 uppercase tracking-[0.35em] opacity-60"
            >Alternative Channels</span
          >
          <div class="flex-grow border-t border-slate-100 dark:border-white/10"></div>
        </div>
        <div class="grid grid-cols-1 gap-6 w-full max-w-sm mx-auto">
          <!-- Component Render sẵn Nút Google chuẩn -->
          <div class="flex justify-center w-full">
            <asl-google-signin-button
              type="standard"
              size="large"
              theme="filled_black"
              [width]="300"
            ></asl-google-signin-button>
          </div>
        </div>
      </div>

      <p
        class="mt-8 text-center text-[9px] font-black text-slate-400 uppercase tracking-[0.3em] opacity-40"
      >
        Secure Node Encryption: AES-256-GCM
      </p>
    </div>
  </div>
</div>
