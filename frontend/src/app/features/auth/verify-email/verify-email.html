<div class="min-h-[80vh] flex items-center justify-center p-4">
  <div class="w-full max-w-md animate-in fade-in slide-in-from-bottom-8 duration-700">
    <!-- Clean Minimalist Card -->
    <div class="bg-white dark:bg-surface-dark rounded-[2rem] 
                border-2 border-slate-100 dark:border-white/5 p-8 md:p-10 
                shadow-2xl shadow-slate-200/50 dark:shadow-none relative">
      
      <!-- Icon & Header -->
      <div class="text-center mb-10">
        <div class="inline-flex items-center justify-center size-20 rounded-3xl 
                    bg-primary text-white mb-6">
          <span class="material-symbols-outlined text-4xl font-bold">mark_email_read</span>
        </div>
        <h2 class="text-2xl font-orbitron font-black text-slate-900 dark:text-white mb-3 tracking-tight uppercase">
          Xác nhận Email
        </h2>
        <p class="text-slate-500 dark:text-slate-400 text-sm">
          Mã OTP đã được gửi đến hòm thư:
          <span class="block font-bold text-slate-900 dark:text-white mt-1">{{ email }}</span>
        </p>
      </div>

      <!-- Input Section -->
      <div class="space-y-6">
        <div class="relative group">
          <input 
            type="text" 
            [(ngModel)]="otpCode" 
            maxlength="6"
            placeholder="Mã OTP 6 số"
            class="w-full px-6 py-5 bg-slate-50 dark:bg-white/5 border-2 
                   border-slate-100 dark:border-white/10 focus:border-primary 
                   dark:focus:border-primary rounded-2xl outline-none 
                   text-2xl tracking-[0.5em] font-black text-center transition-all
                   text-slate-900 dark:text-white
                   placeholder:text-slate-300 dark:placeholder:text-white/10
                   placeholder:tracking-normal placeholder:font-normal placeholder:text-base"
          />
        </div>

        <!-- Action Buttons -->
        <button 
          (click)="verify()" 
          [disabled]="loading || otpCode.length < 6"
          class="w-full py-5 bg-primary hover:bg-primary-dark text-white 
                 font-bold rounded-2xl transition-all active:scale-[0.98]
                 disabled:bg-slate-200 disabled:text-slate-400 
                 dark:disabled:bg-white/5 dark:disabled:text-white/10
                 flex items-center justify-center gap-3 uppercase tracking-wider"
        >
          @if (loading) {
            <span class="material-symbols-outlined animate-spin">progress_activity</span>
            Đang xác thực
          } @else {
            <span class="material-symbols-outlined">verified</span>
            Xác nhận ngay
          }
        </button>

        <!-- Resend Section -->
        <div class="text-center pt-2">
          <button 
            (click)="resend()" 
            [disabled]="resendLoading || countdown() > 0"
            class="text-sm font-bold transition-colors disabled:text-slate-300"
            [ngClass]="countdown() > 0 ? 'text-slate-300' : 'text-primary hover:text-primary-dark'"
          >
            @if (countdown() > 0) {
              GỬI LẠI MÃ SAU ({{ countdown() }}S)
            } @else {
              @if (resendLoading) {
                <span class="animate-pulse">ĐANG GỬI...</span>
              } @else {
                <span class="border-b-2 border-primary/20 hover:border-primary transition-all pb-1">
                  GỬI LẠI MÃ OTP
                </span>
              }
            }
          </button>
        </div>
      </div>

      <!-- Footer Link -->
      <div class="mt-10 pt-8 border-t border-slate-50 dark:border-white/5 text-center">
        <a routerLink="/auth/login" class="text-xs font-black uppercase tracking-widest text-slate-400 hover:text-primary transition-colors flex items-center justify-center gap-2">
          <span class="material-symbols-outlined text-sm">arrow_back</span>
          Quay lại đăng nhập
        </a>
      </div>
    </div>
  </div>
</div>
